<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Join for Free</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script>

let delay = 4000; // 4 seconds
let countdown = delay / 1000;

function updateTimer(){
    let el = document.getElementById("timer");
    if(countdown > 0){
        el.innerText = "Redirecting in " + countdown + "s...";
        countdown--;
    }
}

function openBrowser(){

    let url = "https://t.me/+8uJhOQaWnWxiNzRk";

    if(navigator.userAgent.includes("TikTok")){
        window.location.href = "intent://" + url.replace("https://","") + "#Intent;scheme=https;package=com.android.chrome;end";
    } else {
        window.location.href = url;
    }

}

// countdown display
setInterval(updateTimer, 1000);

// redirect after delay
setTimeout(openBrowser, delay);

</script>

</head>

<body class="bg-dark text-white d-flex align-items-center justify-content-center vh-100">

<div class="container-fluid text-center">

<h2>Click the 3 dots ...⤸ at the top-right corner, then tap "Open in browser"</h2>

<p id="timer">Redirecting...</p>

<a href="https://t.me/+8uJhOQaWnWxiNzRk" target="_blank" class="btn btn-danger btn-lg mt-3">
Start Now
</a>

</div>

</body>
</html>
